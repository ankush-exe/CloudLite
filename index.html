<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudlite</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">


</head>
<body>
    <div class="main-content">
    <header>
        <div class="navbar">
            <i class="fa-solid fa-cloud"></i>

            <h3>Cloudlite</h3>
        

        </div>
        <hr style="width:80%;margin:auto">
        
    </header>
    <main>
        <div class="find">
            <h1>Find Your Weather</h1>
            <p>Get the latest weather forecast for any city in the world</p>
            

        </div>
        <div class="search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Enter city name">
            <button>Search</button>



        </div>
        <div class="lowermain">
        <div class="weather">
            <div class="weathinfo">
            <div class="country">India</div>
            <div class="temp">24°C</div>

            <div class="clouds">Partly cloudly</div>
            </div>
            <div class="img">
                
            </div>
            <br>
            <hr style="width:80%; opacity: 0.3; color:gray">
            <div class="details">
                <div class="logo">
                <i class="fa-solid fa-temperature-arrow-down"></i>
                <div class="feelslike">
                    
                    <div class="title">Feels like</div>
                    <div class="value">24°C</div>

                </div> 
                </div> 
                <div class="logo">  
                    <i class="fa-solid fa-droplet"></i>
                <div class="feelslike">


                    <div class="title">Humidity</div>
                    <div class="value">65%</div>

                </div>
                </div>
                <div class="logo">
                   <i class="fa-solid fa-wind"></i>
                <div class="feelslike">
                    <div class="title">Wind speed</div>
                    <div class="value">5 m/s</div> 

                </div>
                </div>
            </div>


        </div>
    </main>
    <footer>
        <div class="foot">
            Made by Ankush|2025
        </div>
    </footer>
    </div>
</body>
</html>
